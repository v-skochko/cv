function shuffle(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

let questions = [];
let currentIndex = 0;
let score = 0;
let incorrectQuestions = [];
let startTime;
let blinkVisible = true;
let phase = 1;
let ledInterval = null;

function listCategories() {
  const cats = [...new Set(allQuestions.map(q => q.category))];
  const container = document.getElementById('categorySelect');
  container.innerHTML = cats.map(c => `<label><input type="checkbox" name="cat" value="${c}" unchecked> ${c}</label>`).join('');
}

function startTest() {
  if (ledInterval) {
    clearInterval(ledInterval);
    ledInterval = null;
  }
  blinkVisible = true;
  const selected = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(el => el.value);
  questions = shuffle(allQuestions.filter(q => selected.includes(q.category)));
  if (!questions.length) return alert("Оберіть хоча б один розділ!");
  currentIndex = 0;
  score = 0;
  incorrectQuestions = [];
  startTime = Date.now();
  document.getElementById('startBox').style.display = 'none';
  document.getElementById('questionBox').style.display = 'block';
  rebindElements();
  loadQuestion();
}

let questionText, questionImage, answersForm, feedback, result, submitBtn, metaInfo, canvas;

function rebindElements() {
  questionText = document.getElementById('questionText');
  questionImage = document.getElementById('questionImage');
  answersForm = document.getElementById('answers');
  feedback = document.getElementById('feedback');
  result = document.getElementById('result');
  submitBtn = document.getElementById('submitBtn');
  metaInfo = document.getElementById('metaInfo');
  canvas = document.getElementById('ledCanvas');
  submitBtn.onclick = handleSubmit;
}

function getLEDPosition(index) {
  if (index < 5) return { x: 60 + index * 100, y: 50 };
  if (index < 10) return { x: 60 + (index - 5) * 100, y: 130 };
  return { x: 60 + 5 * 100 + 40, y: 130 };
}

function drawLEDs(activeIndex, color, mode, blinkingOn = true, phaseKey = 'phase1') {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const leds = settings[phaseKey].leds;
  leds.forEach((led, index) => {
    const { x, y } = getLEDPosition(index);
    let baseColor = 'grey';
    if (index === activeIndex) {
  if (mode === 'off') {
    baseColor = 'grey';
  } else if (mode === 'blinking') {
    baseColor = blinkingOn ? color : 'grey';
  } else if (mode === 'on') {
    baseColor = color;
  }
}
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, 2 * Math.PI);
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, 20);
    gradient.addColorStop(0, 'white');
    gradient.addColorStop(0.15, 'white');
    gradient.addColorStop(0.85, baseColor);
    gradient.addColorStop(1, baseColor);
    ctx.shadowColor = baseColor;
    ctx.shadowBlur = 15;
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = 'black';
    ctx.stroke();
    ctx.fillStyle = document.body.classList.contains('dark-mode') ? '#f4f4f4' : 'black';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(led.description, x, y + 35);
    if (index === 0 && phase === 1) ctx.fillText('ЕНОТ 100500', 600, 20);
  });
}



function loadQuestion() {
  const q = questions[currentIndex];
  feedback.textContent = '';
  answersForm.innerHTML = '';
  questionText.textContent = q.question;
  metaInfo.innerHTML = `
    <strong>ID:</strong> ${q.id} | 
    <strong>Розділ:</strong> ${q.category} | 
    <strong>Питання:</strong> ${currentIndex + 1} / ${questions.length}
  `;

  if (q.image) {
    questionImage.src = q.image;
    questionImage.style.display = 'block';
  } else {
    questionImage.style.display = 'none';
  }

  if (ledInterval) {
    clearInterval(ledInterval);
    ledInterval = null;
  }

  if (q.canvasData) {
    canvas.style.display = 'block';
	const phaseKey = q.canvasData.phase || 'phase1';
    drawLEDs(q.canvasData.ledIndex, q.canvasData.color, q.canvasData.mode, true, phaseKey);

    if (q.canvasData.mode === 'blinking') {
    let blinkState = true;
    drawLEDs(q.canvasData.ledIndex, q.canvasData.color, q.canvasData.mode, blinkState, phaseKey);
    ledInterval = setInterval(() => {
      blinkState = !blinkState;
      drawLEDs(q.canvasData.ledIndex, q.canvasData.color, q.canvasData.mode, blinkState, phaseKey);
      }, 500);
    }
  } else {
    canvas.style.display = 'none';
  }

  const inputType = q.correct.length === 1 ? 'radio' : 'checkbox';
  q.answers.forEach((answer, index) => {
    const label = document.createElement('label');
    const input = document.createElement('input');
    input.type = inputType;
    input.name = 'answer';
    input.value = index;
    label.appendChild(input);
    label.append(" " + answer);
    answersForm.appendChild(label);
  });
}

function handleSubmit() {
  const q = questions[currentIndex];
  const selected = Array.from(document.querySelectorAll('input[name="answer"]'))
    .filter(el => el.checked)
    .map(el => parseInt(el.value));
  if (!selected.length) {
    feedback.textContent = "Оберіть відповідь(і).";
    return;
  }
  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);
  const isCorrect = selectedSet.size === correctSet.size && [...selectedSet].every(x => correctSet.has(x));
  if (isCorrect) {
    score++;
    feedback.textContent = "✅ Вірно!";
    feedback.style.color = "green";
  } else {
    incorrectQuestions.push(q);
    feedback.textContent = `❌ Невірно. Правильна відповідь: ${q.correct.map(i => q.answers[i]).join(', ')}`;
    feedback.style.color = "red";
  }
  submitBtn.textContent = "Наступне питання";
  submitBtn.onclick = handleNext;
}

function handleNext() {
  currentIndex++;
  if (currentIndex < questions.length) {
    submitBtn.textContent = "Перевірити";
    submitBtn.onclick = handleSubmit;
    loadQuestion();
  } else {
    const percent = Math.round((score / questions.length) * 100);
    const time = Math.round((Date.now() - startTime) / 1000);
    const buttons = `
      <button onclick="location.reload()">Почати заново</button>
      ${incorrectQuestions.length > 0 ? '<button onclick="retryIncorrect()">Повторити помилки</button>' : ''}
    `;
    document.getElementById('questionBox').innerHTML = `
      <div id='result'>
        Тест завершено! Ви відповіли правильно на ${score} з ${questions.length} (${percent}%).<br>
        Час: ${time} сек.<br><br>
        ${buttons}
      </div>
    `;
  }
}

function retryIncorrect() {
  if (!incorrectQuestions.length) return;
  questions = [...incorrectQuestions];
  currentIndex = 0;
  score = 0;
  incorrectQuestions = [];
  document.getElementById('questionBox').innerHTML = `
    <div id="metaInfo"></div>
    <img id="questionImage" src="" alt="Зображення до питання">
    <div id="canvasContainer"><canvas id="ledCanvas" width="700" height="200"></canvas></div>
    <div id="questionText"></div>
    <form id="answers"></form>
    <div id="feedback"></div>
    <button id="submitBtn">Перевірити</button>
    <div id="result"></div>
  `;
  rebindElements();
  loadQuestion();
}

function toggleTheme() {
  const body = document.body;
  body.classList.toggle('dark-mode');
  const isDark = body.classList.contains('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

if (localStorage.getItem('theme') === 'dark' ||
    (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.body.classList.add('dark-mode');
}

function drawReferenceCanvases() {
  const all = document.querySelectorAll('.refCanvas');
  all.forEach(canvas => {
    const ctx = canvas.getContext('2d');
    const ledIndex = +canvas.dataset.index;
    const color = canvas.dataset.color;
    const mode = canvas.dataset.mode;
    const blink = true;
    const leds = JSON.parse(canvas.dataset.leds || '[]');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    leds.forEach((led, index) => {
      const x = 60 + (index % 5) * 100;
      const y = index < 5 ? 40 : 100;
      let baseColor = 'grey';
      if (index === ledIndex) {
        if (mode === 'off') baseColor = 'grey';
        else if (mode === 'on') baseColor = color;
        else if (mode === 'blinking') baseColor = color;
      }
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI * 2);
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, 18);
      //gradient.addColorStop(0, 'white');
      //gradient.addColorStop(0.2, 'white');
      //gradient.addColorStop(1, baseColor);
	  
	  gradient.addColorStop(0, 'white');
      gradient.addColorStop(0.1, 'white');
      gradient.addColorStop(0.90, baseColor);
      gradient.addColorStop(1, baseColor);
	  
	  
      ctx.shadowColor = baseColor;
    ctx.shadowBlur = 15;
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
    ctx.stroke();
      ctx.fillStyle = document.body.classList.contains('dark-mode') ? '#f4f4f4' : '#000';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(led.description, x, y + 28);
    });
  });
}

function filterReference() {
  const value = document.getElementById('searchInput').value.toLowerCase();
  const results = allQuestions.filter(q => q.question.toLowerCase().includes(value));
  const container = document.getElementById('referenceResults');
  if (!value) return container.innerHTML = '';
  container.innerHTML = results.map(q => {
    const imgPart = q.image ? `<div><img src="${q.image}" style="max-width:100%;margin-top:5px;"></div>` : '';
    const ledsStr = JSON.stringify(settings.phase1.leds).replace(/"/g, '&quot;');
    const canvasPart = q.canvasData ? `<div><canvas class='refCanvas' data-index='${q.canvasData.ledIndex}' data-color='${q.canvasData.color}' data-mode='${q.canvasData.mode}' data-phase='${q.canvasData.phase}' data-leds="${ledsStr}" width='500' height='130' style='margin-top:5px;'></canvas></div>` : '';
    return `<div style='margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #ccc;'>
      <strong>${q.id}</strong>: ${q.question}<br>
      <em>Правильна відповідь:</em> ${q.correct.map(i => q.answers[i]).join(', ')}
      ${imgPart}
      ${canvasPart}
    </div>`;
  }).join('') || '<em>Нічого не знайдено</em>';
  drawReferenceCanvases();
}
